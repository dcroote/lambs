name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    # `branches` and `tags` filters are OR'd: only act on version tag pushes here.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tagged commit is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tagged commit is not an ancestor of main; refusing to create a release."
            exit 1
          fi

      - name: Resolve release title from tag message
        env:
          TAG: ${{ github.ref_name }}
        run: |
          msg=$(git tag -l --format='%(contents)' "$TAG")
          msg=$(printf '%s' "$msg")
          if [ -z "$msg" ]; then
            msg="$TAG"
          fi
          printf '%s\n' "$msg" > .release-title

      - name: Create GitHub release
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const tag = context.ref.replace('refs/tags/', '');
            const title =
              fs.readFileSync('.release-title', 'utf8').replace(/\n$/, '') || tag;

            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: title,
              generate_release_notes: true,
            });

            const data = fs.readFileSync('index.html');
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: 'index.html',
              data,
              headers: {
                'content-type': 'text/html',
                'content-length': data.length,
              },
            });
