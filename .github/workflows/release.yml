name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tagged commit is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tagged commit is not an ancestor of main; refusing to create a release."
            exit 1
          fi

      - name: Resolve release title from tag message
        id: meta
        env:
          TAG: ${{ github.ref_name }}
        run: |
          msg=$(git tag -l --format='%(contents)' "$TAG")
          msg=$(printf '%s' "$msg")
          if [ -z "$msg" ]; then
            msg="$TAG"
          fi
          {
            echo "title<<RELEASE_TITLE_EOF"
            printf '%s\n' "$msg"
            echo "RELEASE_TITLE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.meta.outputs.title }}
          files: index.html
