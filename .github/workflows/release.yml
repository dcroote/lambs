name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find v* tag on pushed commit
        id: taginfo
        run: |
          tag=$(git tag -l 'v*' --points-at "$GITHUB_SHA" | sort -V | tail -n1)
          if [ -z "$tag" ]; then
            echo "No v* tag on this commit; skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release title from tag message
        if: steps.taginfo.outputs.skip != 'true'
        env:
          TAG: ${{ steps.taginfo.outputs.tag }}
        run: |
          msg=$(git tag -l --format='%(contents)' "$TAG")
          msg=$(printf '%s' "$msg")
          if [ -z "$msg" ]; then
            msg="$TAG"
          fi
          printf '%s\n' "$msg" > .release-title

      - name: Create GitHub release
        if: steps.taginfo.outputs.skip != 'true'
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ steps.taginfo.outputs.tag }}
        with:
          script: |
            const fs = require('fs');
            const tag = process.env.RELEASE_TAG;
            const title =
              fs.readFileSync('.release-title', 'utf8').replace(/\n$/, '') || tag;

            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: title,
              generate_release_notes: true,
            });

            const data = fs.readFileSync('index.html');
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: 'index.html',
              data,
              headers: {
                'content-type': 'text/html',
                'content-length': data.length,
              },
            });
